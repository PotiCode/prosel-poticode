<header class="site-header">
  <div class="wrapper">
    {%- assign page_paths = site.minima.nav_pages -%}
    {%- assign page_titles = site.pages | map: 'title' | compact %}
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="" class="site-logo" aria-hidden="true">
      {{ site.title | escape }}
    </a>

    {%- unless page_titles == empty %}
      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" />
        <label for="nav-trigger">
          <span class="menu-icon"></span>
        </label>
        {% include nav-items.html paths = page_paths %}
      </nav>
    {%- endunless %}
  </div>
</header>
